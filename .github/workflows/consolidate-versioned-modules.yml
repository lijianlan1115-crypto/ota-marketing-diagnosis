name: Consolidate versioned modules

on:
  push:
    branches:
      - agent/consolidate-versioned-modules
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install pytest

      - name: Capture baseline test results
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=no > baseline-test-output.txt 2>&1
          echo $? > baseline-test-exit.txt
          set -e
          grep -E '^(FAILED|ERROR) ' baseline-test-output.txt | sed 's/ - .*//' | sort -u > baseline-test-issues.txt || true
          cat baseline-test-output.txt

      - name: Consolidate numbered modules
        run: python scripts/consolidate_versioned_modules.py --apply

      - name: Verify consolidation
        run: python scripts/consolidate_versioned_modules.py --check

      - name: Compile package
        run: python -m compileall -q marketing_diagnosis scripts

      - name: Run consolidated regression tests
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=no > consolidation-test-output.txt 2>&1
          echo $? > consolidation-test-exit.txt
          set -e
          grep -E '^(FAILED|ERROR) ' consolidation-test-output.txt | sed 's/ - .*//' | sort -u > consolidation-test-issues.txt || true
          cat consolidation-test-output.txt

      - name: Reject new test failures
        shell: bash
        run: |
          comm -13 baseline-test-issues.txt consolidation-test-issues.txt > new-consolidation-issues.txt
          if [ -s new-consolidation-issues.txt ]; then
            echo "Consolidation introduced new failures:"
            cat new-consolidation-issues.txt
            exit 1
          fi
          echo "No new failures were introduced by consolidation"
          echo "Baseline issues: $(wc -l < baseline-test-issues.txt)"
          echo "Consolidated issues: $(wc -l < consolidation-test-issues.txt)"

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidation-test-output
          path: |
            baseline-test-output.txt
            baseline-test-issues.txt
            consolidation-test-output.txt
            consolidation-test-issues.txt
            new-consolidation-issues.txt
          if-no-files-found: ignore

      - name: Commit generated consolidation
        if: github.event_name == 'push' && success()
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketing_diagnosis docs/versioned-module-consolidation.md
          git commit -m "consolidate versioned runtime modules"
          git push

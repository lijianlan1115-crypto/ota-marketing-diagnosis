skill_id: s14-operation-diagnosis

trigger_policy:
  matching: contains_any
  case_sensitive: false
  default_hotel_id: puyue
  default_platform: multi
  default_period_days: 10

trigger_phrases:
  - S14诊断
  - S14 诊断
  - S14执行
  - S14 执行
  - 运营诊断
  - OTA诊断
  - OTA全面诊断
  - 生成诊断报告
  - 查看诊断报告
  - 美团诊断
  - 携程诊断
  - 多渠道诊断

platform_aliases:
  meituan:
    - 美团
    - meituan
  ctrip:
    - 携程
    - ctrip
  multi:
    - 多渠道
    - 全渠道
    - multi

reply_policy:
  reply_field: feishu_card
  fallback_reply_field: feishu_message
  msg_type: interactive
  force_fresh_run: true
  forbid_cached_agent_text: true
  bot_must_not_format_business_result: true
